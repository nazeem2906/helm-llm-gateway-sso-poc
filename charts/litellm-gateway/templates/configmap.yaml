apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "litellm-gateway.fullname" . }}-config
data:
  config.yaml: |
    model_list:
{{- range .Values.models }}
      - model_name: {{ .name | quote }}
        litellm_params:
          model: {{ .providerModel | quote }}
          api_base: {{ $.Values.backend.apiBase | quote }}
          api_key: os.environ/OPENAI_COMPATIBLE_API_KEY
          ssl_verify: {{ $.Values.backend.sslVerify }}
{{- end }}

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
      store_model_in_db: true

    litellm_settings:
      drop_params: true
      set_verbose: false
