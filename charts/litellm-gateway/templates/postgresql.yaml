apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "litellm-gateway.fullname" . }}-postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "litellm-gateway.fullname" . }}-postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "litellm-gateway.fullname" . }}-postgresql
    spec:
      containers:
        - name: postgresql
          image: {{ .Values.postgresql.image | quote }}
          ports:
            - name: postgresql
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.username | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "litellm-gateway.fullname" . }}-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U {{ .Values.postgresql.username }} -d {{ .Values.postgresql.database }}
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          {{- if .Values.postgresql.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "litellm-gateway.fullname" . }}-postgresql
          {{- else }}
          emptyDir: {}
          {{- end }}
---
{{- if .Values.postgresql.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "litellm-gateway.fullname" . }}-postgresql
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgresql.persistence.size }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "litellm-gateway.fullname" . }}-postgresql
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "litellm-gateway.fullname" . }}-postgresql
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
