{{- if and .Values.sso.enabled .Values.ssoRedirect.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "litellm-gateway.fullname" . }}-sso-redirect-nginx
data:
  default.conf: |
    server {
      listen 8080;

      location / {
        return 302 {{ .Values.sso.authorizationEndpoint }}?response_type=code&client_id={{ .Values.sso.clientId }}&redirect_uri={{ printf "%s%s" .Values.public.baseUrl .Values.sso.callbackPath | urlquery }}&scope=openid%20email%20profile;
      }

      location /healthz {
        return 200 "ok
";
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "litellm-gateway.fullname" . }}-sso-redirect
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "litellm-gateway.fullname" . }}-sso-redirect
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "litellm-gateway.fullname" . }}-sso-redirect
    spec:
      containers:
        - name: nginx
          image: {{ .Values.ssoRedirect.image | quote }}
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "litellm-gateway.fullname" . }}-sso-redirect-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "litellm-gateway.fullname" . }}-sso-redirect
spec:
  type: {{ .Values.ssoRedirect.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "litellm-gateway.fullname" . }}-sso-redirect
  ports:
    - name: http
      port: {{ .Values.ssoRedirect.service.port }}
      targetPort: 8080
      {{- if and (eq .Values.ssoRedirect.service.type "NodePort") .Values.ssoRedirect.service.nodePort }}
      nodePort: {{ .Values.ssoRedirect.service.nodePort }}
      {{- end }}
{{- end }}
